[custom]
; --- 规则设置 ---
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyList.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyListChina.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyPrivacy.list

ruleset=🌍 默认外连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🌍 默认外连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🌍 默认外连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🌍 默认外连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🌍 默认外连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; ================= 分组设置 =================

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动测速`[]🚀 手动切换`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇹🇼 台湾节点`[]⚖️ 香港均衡`[]⚖️ 日本均衡`[]⚖️ 美国均衡`[]⚖️ 新加坡均衡`[]⚖️ 台湾均衡`[]DIRECT

custom_proxy_group=🚀 手动切换`select`.*

custom_proxy_group=♻️ 自动测速`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; --- 1. 区域故障转移 (Fallback) ---
custom_proxy_group=🇭🇰 香港节点`fallback`(香港|HK|Hong Kong|HONGKONG)`http://www.gstatic.com/generate_204`300,,50

; 【核心修正】日本组：优先匹配“日本/JP”，其次匹配含“日”但不含“日用”的节点
custom_proxy_group=🇯🇵 日本节点`fallback`(日本|JP|Japan|JAPAN)|((?=.*日)(?!.*日用).*$)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇺🇸 美国节点`fallback`(美国|US|United States|America|USA)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`fallback`(新加坡|SG|Singapore|狮城)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`fallback`(台湾|TW|Taiwan|ROC)`http://www.gstatic.com/generate_204`300,,50

; --- 2. 区域负载均衡 (Load-balance) ---
custom_proxy_group=⚖️ 香港均衡`load-balance`(香港|HK|Hong Kong|HONGKONG)`http://www.gstatic.com/generate_204`300,,50

; 【核心修正】日本均衡组同理
custom_proxy_group=⚖️ 日本均衡`load-balance`(日本|JP|Japan|JAPAN)|((?=.*日)(?!.*日用).*$)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=⚖️ 美国均衡`load-balance`(美国|US|United States|America|USA)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚖️ 新加坡均衡`load-balance`(新加坡|SG|Singapore|狮城)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚖️ 台湾均衡`load-balance`(台湾|TW|Taiwan|ROC)`http://www.gstatic.com/generate_204`300,,50

; --- 3. 基础分流 ---
custom_proxy_group=🌍 默认外连`select`[]🚀 节点选择`[]♻️ 自动测速`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
