ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL


; ================= 设置分组标志位 =================

; 1. 核心入口：统管自动化、手动、区域Fallback、区域均衡
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动测速`[]🚀 手动切换`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇹🇼 台湾节点`[]⚖️ 香港均衡`[]⚖️ 日本均衡`[]⚖️ 美国均衡`[]⚖️ 新加坡均衡`[]⚖️ 台湾均衡`[]DIRECT

; 2. 全节点集合：允许你点选任何一个特定节点
custom_proxy_group=🚀 手动切换`select`.*

; 3. 自动化大组：测速选择最佳
custom_proxy_group=♻️ 自动测速`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; --- 4. 区域故障转移组 (Fallback) - 适合日常浏览，保证不断线 ---
custom_proxy_group=🇭🇰 香港节点`fallback`(港|HK|Hong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`fallback`(日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`fallback`(美|US|United)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`fallback`(新|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`fallback`(台|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,50

; --- 5. 区域负载均衡组 (Load-balance) - 适合下载/看视频，压榨带宽 ---
custom_proxy_group=⚖️ 香港均衡`load-balance`(港|HK|Hong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚖️ 日本均衡`load-balance`(日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚖️ 美国均衡`load-balance`(美|US|United)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚖️ 新加坡均衡`load-balance`(新|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=⚖️ 台湾均衡`load-balance`(台|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,50

; --- 6. 绑定规则和策略组 ---
custom_proxy_group=🌍 默认外连`select`[]🚀 节点选择`[]♻️ 自动测速`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇹🇼 台湾节点`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🌍 默认外连`[]DIRECT
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
