; 【优化】已取消注释：开启默认外连规则，确保被墙网站能正确走代理
ruleset=🌍 默认外连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🌍 默认外连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
